services:
  artemis:
    image: apache/activemq-artemis:latest
    container_name: artemis
    restart: always
    environment:
      - ARTEMIS_USER=admin
      - ARTEMIS_PASSWORD=admin
    ports:
      - "8161:8161"
      - "61616:61616"
    volumes:
      - artemis_data:/var/lib/artemis-instance
    networks:
      - monitoring-network

volumes:
  artemis_data:

networks:
  monitoring-network:
    driver: bridge
    name: monitoring-network
